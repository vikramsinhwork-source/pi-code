# go2rtc config — MODE A: hardware H264 transcode (Pi V4L2 / h264_v4l2m2m)
# Copy to ~/go2rtc.yaml and restart go2rtc.
#
# Switch ALL cameras to software encode: use go2rtc.example.software.yaml instead.
# Dahua: subtype=1 is substream (lower res); subtype=0 is main stream — see comments below.

api:
  listen: ":1984"

webrtc:
  listen: ":8555/tcp"
  candidates:
    - 192.168.1.9:8555  # Pi LAN IP — same-LAN viewers only
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]
    - urls: [turn:turn.railwaymonitor.in:3478]
      username: turnuser
      credential: turnpassword

streams:
  # ── Mode A: ffmpeg hardware H264 (#hardware) ─────────────────────────────
  # Dahua RTSP substream (subtype=1) — lower bandwidth, often H265 from DVR
  camera1:
    - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=1&subtype=1#video=h264#hardware
  camera2:
    - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=2&subtype=1#video=h264#hardware
  camera3:
    - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=3&subtype=1#video=h264#hardware
  camera4:
    - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=4&subtype=1#video=h264#hardware
  camera5:
    - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=5&subtype=1#video=h264#hardware

  # ── Main stream test (subtype=0) — uncomment ONE camera to compare quality/codec
  # camera2_main:
  #   - ffmpeg:rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=2&subtype=0#video=h264#hardware

  # kiosk1:
  #   - vnc://127.0.0.1:5900
