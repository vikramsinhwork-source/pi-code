# RailWatch Pi — go2rtc config (copy to ~/go2rtc.yaml, edit passwords/IPs, restart go2rtc)
#
# Chrome WebRTC needs H.264. Dahua DVRs often send H.265 on RTSP — transcode with ffmpeg.
# Do NOT use #hardware on Raspberry Pi (breaks browser decode: gray frames, framesDecoded stuck).
#
# Dahua: subtype=1 = substream, subtype=0 = main stream.
# TURN: browser gets ice_servers from Railway backend; go2rtc also needs ice_servers below for remote viewers.
#
# Setup:
#   cp docs/go2rtc.example.yaml ~/go2rtc.yaml
#   sudo systemctl restart go2rtc
#
# Verify:
#   curl -s http://127.0.0.1:1984/api/streams | jq '.camera1'
#   node agent/scripts/webrtc-diagnose.js camera2

api:
  listen: ":1984"

webrtc:
  listen: ":8555/tcp"
  candidates:
    - 192.168.1.9:8555  # Pi LAN IP
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]
    - urls: [turn:turn.railwaymonitor.in:3478]
      username: turnuser      # match TURN_USERNAME on VPS
      credential: turnpassword  # match TURN_PASSWORD on VPS

ffmpeg:
  global: "-hide_banner -loglevel warning"
  timeout: 10
  h264: >-
    -codec:v libx264
    -pix_fmt:v yuv420p
    -preset:v ultrafast
    -tune:v zerolatency
    -profile:v baseline
    -level:v 3.1
    -bf:v 0
    -g:v 15
    -keyint_min:v 15
    -sc_threshold:v 0
    -x264-params repeat-headers=1:annexb=1

streams:
  camera1:
    - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=1&subtype=1
    - ffmpeg:camera1#video=h264
  camera2:
    - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=2&subtype=1
    - ffmpeg:camera2#video=h264
  camera3:
    - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=3&subtype=1
    - ffmpeg:camera3#video=h264
  camera4:
    - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=4&subtype=1
    - ffmpeg:camera4#video=h264
  camera5:
    - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=5&subtype=1
    - ffmpeg:camera5#video=h264

  # kiosk1:
  #   - vnc://127.0.0.1:5900

  # If one camera still fails, try main stream (subtype=0) for that channel only.
  # camera2:
  #   - rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=2&subtype=0
  #   - ffmpeg:camera2#video=h264

  # Last resort — explicit exec transcode for one camera (replace camera2 block above):
  # camera2:
  #   - exec:ffmpeg -hide_banner -rtsp_transport tcp -i "rtsp://admin:PASSWORD@192.168.1.3:554/cam/realmonitor?channel=2&subtype=1" -an -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1 -bf 0 -g 15 -keyint_min 15 -sc_threshold 0 -x264-params repeat-headers=1:annexb=1 -flags +global_header -f rtsp -rtsp_transport tcp {output}
