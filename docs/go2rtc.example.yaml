# RailWatch Pi — copy to ~/go2rtc.yaml
#   cp docs/go2rtc.example.yaml ~/go2rtc.yaml
#   sudo systemctl restart go2rtc
#
# Rollback: cp ~/go2rtc.yaml.bak ~/go2rtc.yaml && sudo systemctl restart go2rtc
#
# go2rtc version: preload requires >= 1.9.11; multi-tab hang fixes >= 1.9.9
#   go2rtc -version
#   Upgrade: https://github.com/AlexxIT/go2rtc/releases (arm64 binary for Pi)
#
# Verify preload (producers should exist before opening stream.html):
#   curl -s http://127.0.0.1:1984/api/streams | jq '.camera1.producers'
#
# WebRTC test: http://127.0.0.1:1984/stream.html?src=camera1&mode=webrtc
# Diagnose: node agent/scripts/webrtc-diagnose.js camera1 --concurrent 3
#
# If streams hang after failed tabs: curl http://127.0.0.1:1984/api/stacks
# Agent JPEG pipeline must be off for WebRTC testing: JPEG_PIPELINE_ENABLED=false

api:
  listen: ":1984"
  origin: "*"

webrtc:
  listen: ":8555/tcp"
  ice_servers:
    - urls:
        - stun:stun.l.google.com:19302
    - urls:
        - turn:turn.railwaymonitor.in:3478
      username: turnuser
      credential: turnpassword

# Preload keeps RTSP producers warm at boot — fixes first stream.html open delay.
# Do not preload kiosk VNC streams (always-on would waste resources).
preload:
  camera1: "video"
  camera2: "video"
  camera3: "video"
  camera4: "video"
  camera5: "video"

ffmpeg:
  global: "-hide_banner -loglevel warning"
  timeout: 30
  h264: >-
    -codec:v libx264
    -pix_fmt:v yuv420p
    -preset:v ultrafast
    -tune:v zerolatency
    -profile:v baseline
    -level:v 3.1
    -bf:v 0
    -g:v 15
    -keyint_min:v 15
    -sc_threshold:v 0
    -x264-params repeat-headers=1:annexb=1

streams:
  camera1:
    - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=1&subtype=1#video=h264
  camera2:
    - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=2&subtype=1#video=h264
  camera3:
    - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=3&subtype=1#video=h264
  camera4:
    - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=4&subtype=1#video=h264
  camera5:
    - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=5&subtype=1#video=h264

  kiosk1:
    - vnc://10.71.35.210:5900
  kiosk2:
    - vnc://10.71.35.211:5900

  # Faster cold start if substream is already H264 (test one camera at a time):
  # camera1:
  #   - rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=1&subtype=1
  #
  # If decode still stuck: try main stream on one camera (subtype=0):
  # camera1:
  #   - ffmpeg:rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=1&subtype=0#video=h264
