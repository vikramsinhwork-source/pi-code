# RailWatch Pi — copy to /etc/mediamtx/mediamtx.yml (or ~/mediamtx.yml for dev)
#   sudo cp docs/mediamtx.example.yml /etc/mediamtx/mediamtx.yml
#   sudo systemctl restart mediamtx
#
# Local WebRTC test: http://127.0.0.1:8889/camera1/
# API health:        curl -s http://127.0.0.1:9997/v3/paths/list | jq .
#
# After editing PI_PLAYBACK_IP in agent/.env, run:
#   agent/scripts/sync-mediamtx-playback-ip.sh
#
# RTSP credentials and NVR IP should match your Dahua/RailNet deployment.

logLevel: info

api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

hls: yes
hlsAddress: :8888
hlsSegmentDuration: 2s
hlsPartDuration: 500ms

webrtc: yes
webrtcAddress: :8889

# Single LAN IP monitors use for WebRTC ICE (must match PI_PLAYBACK_IP on this Pi).
webrtcAdditionalHosts:
  - 192.168.1.8

# Browser LAN playback: stream_token validated by backend.
# Agent localhost WHEP, API poll, runOnDemand ffmpeg publish: backend /api/mediamtx/auth bypass (127.0.0.1).
# authInternalUsers is NOT used when authMethod is http.
authMethod: http
authHTTPAddress: https://railwaymonitor.in/api/mediamtx/auth

webrtcAllowOrigins:
  - "https://railwaymonitor.in"
  - "http://localhost:*"

webrtcICEServers2:
  - url: turn:turn.railwaymonitor.in:3478
    username: turnuser
    password: turnpassword
    clientOnly: true

# ffmpeg runOnDemand: pull NVR RTSP, publish H264 for browser WebRTC (on-demand when viewer connects).
paths:
  camera1:
    runOnDemand: >
      ffmpeg -hide_banner -loglevel error -rtsp_transport tcp
      -i rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=1&subtype=1
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1
      -pix_fmt yuv420p -g 30 -keyint_min 30 -sc_threshold 0 -an
      -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 45s
    runOnDemandCloseAfter: 60s
  camera2:
    runOnDemand: >
      ffmpeg -hide_banner -loglevel error -rtsp_transport tcp
      -i rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=2&subtype=1
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1
      -pix_fmt yuv420p -g 30 -keyint_min 30 -sc_threshold 0 -an
      -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 45s
    runOnDemandCloseAfter: 60s
  camera3:
    runOnDemand: >
      ffmpeg -hide_banner -loglevel error -rtsp_transport tcp
      -i rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=3&subtype=1
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1
      -pix_fmt yuv420p -g 30 -keyint_min 30 -sc_threshold 0 -an
      -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 45s
    runOnDemandCloseAfter: 60s
  camera4:
    runOnDemand: >
      ffmpeg -hide_banner -loglevel error -rtsp_transport tcp
      -i rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=4&subtype=1
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1
      -pix_fmt yuv420p -g 30 -keyint_min 30 -sc_threshold 0 -an
      -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 45s
    runOnDemandCloseAfter: 60s
  camera5:
    runOnDemand: >
      ffmpeg -hide_banner -loglevel error -rtsp_transport tcp
      -i rtsp://admin2:admin123@192.168.1.3:554/cam/realmonitor?channel=5&subtype=1
      -c:v libx264 -preset ultrafast -tune zerolatency -profile:v baseline -level 3.1
      -pix_fmt yuv420p -g 30 -keyint_min 30 -sc_threshold 0 -an
      -f rtsp rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 45s
    runOnDemandCloseAfter: 60s
  kiosk1:
    sourceOnDemand: no
  kiosk2:
    sourceOnDemand: no
